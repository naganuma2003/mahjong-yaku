<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀プロ検索</title>
<meta name="description" content="最高位戦・連盟・協会・RMU・麻将連合のリーグ成績年表。2200人以上の麻雀プロの成績を検索・閲覧できます。">
<meta property="og:title" content="麻雀プロ検索">
<meta property="og:description" content="最高位戦・連盟・協会・RMU・麻将連合のリーグ成績年表">
<meta property="og:type" content="website">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-header">
  <div class="header-top">
    <a href="../" class="back-link">← ホーム</a>
  </div>
  <h1>麻雀プロ検索</h1>
  <p class="subtitle">最高位戦・連盟・協会・RMU・麻将連合のリーグ成績年表</p>
</div>

<div class="layout">
  <aside class="sidebar">
    <button class="filter-toggle" id="filterToggle" onclick="toggleFilter()">▼ 絞り込みを表示</button>
    <div class="org-filter" id="orgFilter"></div>
    <div class="search-row">
      <input class="search" id="search" type="search" placeholder="名前・タイトル・団体で検索…">
      <input class="year-input" id="yearFilter" type="number" placeholder="年" min="1976" max="2030">
      <select class="sort-select" id="sortSelect">
        <optgroup label="基本">
          <option value="name">名前順</option>
          <option value="recent">最近活動順</option>
          <option value="debut">デビュー年順</option>
          <option value="records">出場期数順</option>
        </optgroup>
        <optgroup label="成績">
          <option value="tier">最高ティア順</option>
          <option value="playoff">決定戦回数順</option>
          <option value="pts">今期pt順</option>
          <option value="avgpts">平均pt順</option>
          <option value="totalpts">通算pt順</option>
          <option value="career">活動年数順</option>
        </optgroup>
      </select>
    </div>
    <div class="count-row">
  <div class="player-count" id="playerCount"></div>
  <button class="help-btn" id="rankingBtn" title="今期ランキング：今期出場中＋今期pt順" onclick="quickRanking()">📊</button>
  <button class="help-btn" id="copyListBtn" title="一覧をコピー" onclick="copyPlayerList()">📋</button>
  <button class="help-btn" id="randomBtn" title="ランダムに選手を表示" onclick="openRandomPlayer()">🎲</button>
  <button class="help-btn" id="helpBtn" title="キーボードショートカット">?</button>
</div>
<div class="help-panel" id="helpPanel" style="display:none">
  <div><kbd>/</kbd> 検索にフォーカス</div>
  <div><kbd>↑</kbd><kbd>↓</kbd> 選手を選択 / <kbd>PgUp</kbd><kbd>PgDn</kbd> 10件ずつ</div>
  <div><kbd>Enter</kbd> 先頭の選手を開く</div>
  <div><kbd>Esc</kbd> 選択解除</div>
  <div><kbd>?</kbd> このパネルを開閉</div>
  <div><kbd>f</kbd> お気に入りに追加/削除 / <kbd>r</kbd> ランダム選手を表示</div>
  <div style="margin-top:4px;border-top:1px solid var(--border);padding-top:4px">☆ ボタンで選手をお気に入り登録、フィルターで絞り込み</div>
  <div>📊 今期ランキング表示 / 🎲 ランダム選手 / 📋 一覧コピー</div>
</div>
    <ul class="player-list" id="playerList"></ul>
  </aside>
  <main class="detail" id="detail">
    <div class="placeholder">← 選手を選択してください</div>
  </main>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
document.getElementById('helpBtn').addEventListener('click', function() {
  var p = document.getElementById('helpPanel');
  p.style.display = p.style.display === 'none' ? 'flex' : 'none';
});
function copyPlayerLink() {
  const btn = document.querySelector('.copy-link-btn');
  const url = location.href;
  const name = document.title.replace(' - 麻雀プロ検索', '');
  if (navigator.share) {
    navigator.share({ title: name + ' - 麻雀プロ検索', url: url }).catch(function(){});
    return;
  }
  navigator.clipboard.writeText(url).then(function() {
    if (btn) { btn.textContent = '✓'; setTimeout(function() { btn.textContent = '🔗'; }, 1500); }
  });
}
function quickRanking() {
  state.ongoingOnly = true;
  state.sort = 'pts';
  document.getElementById('sortSelect').value = 'pts';
  renderOrgFilter();
  renderList();
}
function copyPlayerList() {
  const list = filteredPlayers();
  if (!list.length) return;
  const header = ["名前", "団体", "デビュー年", "出場期数", "通算pt"].join("\t");
  const rows = list.map(function(p) {
    const orgId = (p.records && p.records.length) ? (p.records[p.records.length - 1].orgId || p.org) : p.org;
    const org = window.MJ_DATA.organizations.find(function(o) { return o.id === orgId; });
    const debutYrs = (p.records || []).map(function(r) {
      return termToYear(r.orgId || p.org, r.term);
    }).filter(function(y) { return y > 1000; });
    const debut = debutYrs.length ? Math.min.apply(null, debutYrs) : "";
    const recs = (p.records || []).concat(p.wrecords || []).filter(function(r) { return !r.ongoing && r.points != null; });
    const totalPts = recs.length ? recs.reduce(function(s, r) { return s + r.points; }, 0).toFixed(1) : "";
    const totalRecs = (p.records || []).length + (p.wrecords || []).length;
    return [p.name, org ? org.shortName : p.org, debut, totalRecs, totalPts].join("\t");
  });
  const text = header + "\n" + rows.join("\n");
  const btn = document.getElementById("copyListBtn");
  navigator.clipboard.writeText(text).then(function() {
    if (btn) { btn.textContent = "✓"; setTimeout(function() { btn.textContent = "📋"; }, 1500); }
  });
}
function openRandomPlayer() {
  const list = filteredPlayers();
  if (!list.length) return;
  const p = list[Math.floor(Math.random() * list.length)];
  state.selectedId = p.id;
  renderList();
  scrollToSelected();
  renderDetail(p);
}
function toggleFilter() {
  const filter = document.getElementById('orgFilter');
  const open = filter.classList.contains('open');
  filter.classList.toggle('open', !open);
  renderOrgFilter();
}
</script>
</body>
</html>
