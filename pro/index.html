<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀プロ検索</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-header">
  <h1>麻雀プロ検索</h1>
  <p class="subtitle">最高位戦・連盟・協会・RMU・麻将連合のリーグ成績年表</p>
</div>

<div class="layout">
  <aside class="sidebar">
    <button class="filter-toggle" id="filterToggle" onclick="toggleFilter()">▼ 絞り込みを表示</button>
    <div class="org-filter" id="orgFilter"></div>
    <div class="search-row">
      <input class="search" id="search" type="search" placeholder="選手名で検索…">
      <select class="sort-select" id="sortSelect">
        <option value="name">名前順</option>
        <option value="records">データ数順</option>
      </select>
    </div>
    <div class="player-count" id="playerCount"></div>
    <ul class="player-list" id="playerList"></ul>
  </aside>
  <main class="detail" id="detail">
    <div class="placeholder">← 選手を選択してください</div>
  </main>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
function toggleFilter() {
  const btn = document.getElementById('filterToggle');
  const filter = document.getElementById('orgFilter');
  const open = filter.style.display !== 'none';
  filter.style.display = open ? 'none' : '';
  btn.textContent = open ? '▼ 絞り込みを表示' : '▲ 絞り込みを隠す';
}
// PC では常に表示
function initFilterToggle() {
  if (window.innerWidth > 760) {
    document.getElementById('filterToggle').style.display = 'none';
    document.getElementById('orgFilter').style.display = '';
  } else {
    document.getElementById('orgFilter').style.display = 'none';
  }
}
window.addEventListener('resize', initFilterToggle);
document.addEventListener('DOMContentLoaded', initFilterToggle);
</script>
</body>
</html>
