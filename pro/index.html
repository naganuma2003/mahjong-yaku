<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀プロ検索</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-header">
  <h1>麻雀プロ検索</h1>
  <p class="subtitle">最高位戦・協会・連盟のリーグ成績年表</p>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="org-filter" id="orgFilter"></div>
    <input class="search" id="search" type="search" placeholder="選手名で検索…">
    <div class="player-count" id="playerCount"></div>
    <ul class="player-list" id="playerList"></ul>
  </aside>
  <main class="detail" id="detail">
    <div class="placeholder">← 選手を選択してください</div>
  </main>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
